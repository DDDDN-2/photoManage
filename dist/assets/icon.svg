<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">AI 图片素材库图标</title>
  <desc id="desc">暖白圆角应用图标，包含图片素材卡、归档色标和 AI 星标。</desc>
  <defs>
    <linearGradient id="base" x1="96" y1="54" x2="416" y2="462" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#efe3d1"/>
    </linearGradient>
    <linearGradient id="card" x1="150" y1="115" x2="380" y2="404" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7efe3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2d261c" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#28241f"/>
  <rect x="36" y="36" width="440" height="440" rx="96" fill="url(#base)"/>
  <path d="M103 96c44-35 110-48 174-35 72 14 132 60 153 123 19 57-1 126-45 178-43 51-107 85-175 78-70-7-130-53-158-113-34-73-7-178 51-231Z" fill="#fff7ea" opacity=".72"/>

  <g filter="url(#shadow)">
