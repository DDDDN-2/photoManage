    <rect x="207" y="344" width="50" height="42" rx="12" fill="#b65f3a"/>
    <rect x="272" y="344" width="50" height="42" rx="12" fill="#b94f6a"/>
    <rect x="337" y="344" width="22" height="42" rx="11" fill="#d79a2b"/>
