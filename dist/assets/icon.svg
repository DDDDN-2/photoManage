    <rect x="112" y="113" width="272" height="62" rx="36" fill="#ffffff"/>
    <path d="M112 151c0 13.3 10.7 24 24 24h248v-26c0-19.9-16.1-36-36-36H148c-19.9 0-36 16.1-36 36v2Z" fill="#fffaf1"/>
  </g>

  <g>
    <circle cx="151" cy="144" r="9" fill="#b94f6a"/>
    <circle cx="181" cy="144" r="9" fill="#d79a2b"/>
    <circle cx="211" cy="144" r="9" fill="#3566a8"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M151 210h194" stroke="#ded8cf" stroke-width="12"/>
    <path d="M151 312l48-55 38 40 32-32 73 78" stroke="#3566a8" stroke-width="20"/>
    <circle cx="312" cy="245" r="25" fill="#d79a2b" stroke="#fffdf8" stroke-width="10"/>
  </g>

